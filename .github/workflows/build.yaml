name: Build for Android

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # -------------------------
      # 1. Checkout 源码
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # 2. 环境配置 (JDK 21)
      # -------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      # -------------------------
      # 3. Gradle 权限与清理
      # -------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      # -------------------------
      # 4. 缓存以加速构建
      # -------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -------------------------
      # 5. 编译手机端与手表端 Release APK
      # -------------------------
      - name: Build All Release APKs
        run: |
          ./gradlew :mobile:assembleRelease
          ./gradlew :wear:assembleRelease

      # -------------------------
      # -------------------------
      # 6. 🔥 核心修复：智能搜索并使用 Ubuntu 自带工具链进行对齐与签名
      # -------------------------
      - name: Sign and Align APKs
        run: |
          # 1. 从 Secrets 还原密钥文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks
          
          # 2. 自动寻找系统内置的最新的 zipalign 和 apksigner
          ZIPALIGN=$(find $ANDROID_HOME/build-tools/ -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools/ -name apksigner | sort -V | tail -n 1)
          
          echo "Using zipalign: $ZIPALIGN"
          echo "Using apksigner: $APKSIGNER"
          
          # 3. 🧠 智能寻找手机端生成的原始 APK 文件
          RAW_MOBILE_APK=$(find mobile/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          echo "Found raw mobile APK: $RAW_MOBILE_APK"
          
          # 4. 对齐并签名手机端 APK
          $ZIPALIGN -v 4 "$RAW_MOBILE_APK" mobile-signed.apk
          $APKSIGNER sign --ks my-release-key.jks --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" --ks-key-alias "${{ secrets.KEY_ALIAS }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" mobile-signed.apk
          
          # 5. 🧠 智能寻找手表端生成的原始 APK 文件
          RAW_WEAR_APK=$(find wear/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          echo "Found raw wear APK: $RAW_WEAR_APK"
          
          # 6. 对齐并签名手表端 APK
          $ZIPALIGN -v 4 "$RAW_WEAR_APK" wear-signed.apk
          $APKSIGNER sign --ks my-release-key.jks --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" --ks-key-alias "${{ secrets.KEY_ALIAS }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" wear-signed.apk
          
          # 7. 清理临时密钥
          rm my-release-key.jks

      # =========================
      # 7. 上传手机端 APK Artifact
      # =========================
      - name: Upload mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-APK
          path: mobile-signed.apk

      # =========================
      # 8. 上传手表端 APK Artifact
      # =========================
      - name: Upload wear APK
        uses: actions/upload-artifact@v4
        with:
          name: Wear-APK
          path: wear-signed.apk

      # =========================
      # 9. 自动关联发布到 Release
      # =========================
      - name: Attach APKs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile-signed.apk
            wear-signed.apk
