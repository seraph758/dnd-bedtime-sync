name: Build for Android

on:
  release:
    types:
      - published

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout source
        uses: actions/checkout@v4

      # Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      # Gradle permission
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Cache
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -------------------------
      # Build MOBILE
      # -------------------------
      - name: Build mobile release APK
        run: ./gradlew :mobile:assembleRelease

      # Upload mobile artifact
      - name: Upload mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-APK
          path: mobile/build/outputs/apk/release/*.apk

      # Attach mobile APK to GitHub Release
      - name: Attach mobile APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/outputs/apk/release/*.apk

      # -------------------------
      # Build WEAR
      # -------------------------
      - name: Build wear release APK
        run: ./gradlew :wear:assembleRelease

      # Upload wear artifact
      - name: Upload wear APK
        uses: actions/upload-artifact@v4
        with:
          name: Wear-APK
          path: wear/build/outputs/apk/release/*.apk

      # Attach wear APK to GitHub Release
      - name: Attach wear APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: wear/build/outputs/apk/release/*.apk
