name: Build for Android

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # -------------------------
      # Checkout 源码
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # 环境配置 (JDK 21)
      # -------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      # -------------------------
      # Gradle 权限与清理
      # -------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      # -------------------------
      # 缓存缓存以加速构建
      # -------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # =========================
      # 手机端：编译与自动签名
      # =========================
      - name: Build mobile release APK
        run: ./gradlew :mobile:assembleRelease

      - name: Sign Mobile APK
        id: sign_mobile
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: mobile/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-APK
          path: ${{ steps.sign_mobile.outputs.signedReleaseFile }}

      # =========================
      # 手表端：编译与自动签名（使用相同密钥）
      # =========================
      - name: Build wear release APK
        run: ./gradlew :wear:assembleRelease

      - name: Sign Wear APK
        id: sign_wear
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload wear APK
        uses: actions/upload-artifact@v4
        with:
          name: Wear-APK
          path: ${{ steps.sign_wear.outputs.signedReleaseFile }}

      # =========================
      # 自动关联发布到 Release
      # =========================
      - name: Attach APKs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_mobile.outputs.signedReleaseFile }}
            ${{ steps.sign_wear.outputs.signedReleaseFile }}
