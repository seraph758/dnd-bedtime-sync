name: Build Android APKs

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------
      # Java 21
      # -------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      # -------------------------
      # Gradle permission
      # -------------------------
      - name: Grant execute permission
        run: chmod +x gradlew

      # -------------------------
      # Clean
      # -------------------------
      - name: Clean project
        run: ./gradlew clean

      # -------------------------
      # Build APKs
      # -------------------------
      - name: Build mobile release
        run: ./gradlew :mobile:assembleRelease

      - name: Build wear release
        run: ./gradlew :wear:assembleRelease

      # -------------------------
      # Decode keystore
      # -------------------------
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      # -------------------------
      # Sign mobile APK
      # -------------------------
      - name: Sign mobile APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: mobile/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # -------------------------
      # Sign wear APK
      # -------------------------
      - name: Sign wear APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # -------------------------
      # Rename APKs
      # -------------------------
      - name: Rename APKs
        run: |
          cp mobile/build/outputs/apk/release/*signed.apk mobile-release.apk
          cp wear/build/outputs/apk/release/*signed.apk wear-release.apk

      # -------------------------
      # Upload Artifacts
      # -------------------------
      - name: Upload mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-APK
          path: mobile-release.apk

      - name: Upload wear APK
        uses: actions/upload-artifact@v4
        with:
          name: Wear-APK
          path: wear-release.apk

      # -------------------------
      # Attach to GitHub Release
      # -------------------------
      - name: Attach APKs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile-release.apk
            wear-release.apk
